services:
  - type: web
    name: student-management-backend
    env: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        fromDatabase:
          name: student-management-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: student-management-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: student-management-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: student-management-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: student-management-db
          property: database
      - key: DATABASE_URL
        fromDatabase:
          name: student-management-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: BCRYPT_SALT_ROUNDS
        value: 12

databases:
  - name: student-management-db
    databaseName: student_management
    user: admin
    plan: free
    region: frankfurt
